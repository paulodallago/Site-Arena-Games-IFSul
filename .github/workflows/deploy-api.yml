name: Deploy Client
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_PALETEADA_HOST }}
          username: ${{ vars.SERVER_PALETEADA_USER }}
          key: ${{ secrets.SSH_PALETEADA_PRIVATE_KEY }}
          script: |
            echo "🚀 Iniciando deploy do Arena Games..."
            cd /srv/docker/sites/arenagames

            echo "📥 Atualizando código..."
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "🔨 Buildando imagem React ..."
            docker image build -t arenagames-builder:latest .

            echo "📦 Extraindo build para o host..."
            docker container rm -f tmp-arenagames 2>/dev/null || true
            docker container create --name tmp-arenagames arenagames-builder:latest
            rm -rf /srv/docker/sites/arenagames/dist
            mkdir -p /srv/docker/sites/arenagames/dist
            docker container cp tmp-arenagames:/app/build/. /srv/docker/sites/arenagames/dist/
            docker container rm tmp-arenagames

            echo "🔄 Recarregando nginx..."
            cd /srv/docker/sites
            docker compose restart nginx
            echo "✅ Deploy finalizado!"